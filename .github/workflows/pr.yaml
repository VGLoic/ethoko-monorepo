name: Pull Request Workflow
on:
  pull_request:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build
  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm check-format
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled
      # Otherwise, the observed behavior is that the apps are not finding the Ethoko CLI binary
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm install
      - run: pnpm check-types
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled
      # Otherwise, the observed behavior is that the apps are not finding the Ethoko CLI binary
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm install
      - run: pnpm lint
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled
      # Otherwise, the observed behavior is that the apps are not finding the Ethoko CLI binary
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm install
      - run: pnpm test:unit
  build-cli-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm --filter @ethoko/cli-beacon build:binary
      # Smoke test to ensure the CLI binary was built correctly
      - run: ./packages/cli-beacon/binaries/ethoko-linux-x64 --version
  test-e2e-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled
      # Otherwise, the observed behavior is that the apps are not finding the Ethoko CLI binary
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm install
      - run: pnpm test:e2e:core
  test-e2e-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: "recursive"
      - uses: pnpm/action-setup@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled
      # Otherwise, the observed behavior is that the apps are not finding the Ethoko CLI binary
      - run: pnpm build --filter=@ethoko/cli-beacon
      - run: pnpm install
      - run: pnpm test:e2e:apps
