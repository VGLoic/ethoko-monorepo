  test-e2e-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
            submodules: "recursive"
      - uses: pnpm/action-setup@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install
      # For obscure reasons, the CLI needs to be explictly built and reinstalled in `uniswap-v4-core` for the e2e tests.
      # Otherwise, the observed behavior is that uniswap-v4-core is not finding the Ethoko CLI binary
      # Note that it works very well for the other apps without this step
      - run: pnpm build --filter=@ethoko/cli
      - run: pnpm install --filter=uniswap-v4-core
      - run: pnpm test:e2e:apps --filter=uniswap-v4-core
